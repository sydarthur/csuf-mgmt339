<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CPM Cost–Time Optimization — St. John's Hospital</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&family=JetBrains+Mono:wght@400;500;600&display=swap');

:root {
  --bg: #f0f4f8;
  --card: #ffffff;
  --border: #e2e8f0;
  --text: #1a202c;
  --muted: #64748b;
  --navy: #1e3a5f;
  --blue: #2563eb;
  --gold: #d97706;
  --crit: #dc2626;
  --crit-light: #fef2f2;
  --green: #059669;
  --green-light: #ecfdf5;
  --amber: #d97706;
  --amber-light: #fffbeb;
  --purple: #7c3aed;
  --purple-light: #f5f3ff;
  --teal: #0891b2;
  --shadow: 0 2px 8px rgba(0,0,0,0.08);
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family:'DM Sans',system-ui,sans-serif;
  background:var(--bg);
  color:var(--text);
  height:100vh;
  display:flex;
  flex-direction:column;
  overflow:hidden;
}

/* ── Header ── */
header {
  background:var(--navy);
  color:#fff;
  padding:10px 20px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  flex-shrink:0;
}
header h1 { font-size:.95rem; font-weight:600; letter-spacing:-.01em; }
header a  { color:#93c5fd; font-size:.8rem; text-decoration:none; }
header a:hover { color:#fff; }

/* ── Progress bar ── */
.prog-wrap {
  background:var(--navy);
  padding:0 20px 8px;
  display:flex;
  align-items:center;
  gap:10px;
  flex-shrink:0;
}
.prog-track { flex:1; height:5px; background:#2d4e73; border-radius:3px; }
.prog-fill   { height:100%; background:#f59e0b; border-radius:3px; transition:width .35s ease; }
.prog-lbl    { color:#94a3b8; font-size:.72rem; min-width:70px; text-align:right; }

/* ── Main layout ── */
#layout {
  flex:1;
  display:grid;
  grid-template-columns:1fr 360px;
  overflow:hidden;
}

/* ── Left panel: cost view ── */
#left-panel {
  background:#fff;
  border-right:1px solid var(--border);
  display:flex;
  flex-direction:column;
  overflow:hidden;
}

#left-header {
  background:#f8fafc;
  border-bottom:1px solid var(--border);
  padding:10px 16px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  flex-shrink:0;
}
#left-header h2 { font-size:.8rem; font-weight:700; color:var(--navy); text-transform:uppercase; letter-spacing:.06em; }

#left-body {
  flex:1;
  overflow-y:auto;
  padding:14px 16px;
  display:flex;
  flex-direction:column;
  gap:12px;
}

/* Cost summary bar */
.cost-bar {
  background:var(--navy);
  border-radius:10px;
  padding:12px 16px;
  color:#fff;
  display:grid;
  grid-template-columns:1fr 1fr 1fr;
  gap:8px;
}
.cost-bar .citem { text-align:center; }
.cost-bar .clbl  { font-size:.65rem; font-weight:600; text-transform:uppercase; letter-spacing:.06em; color:#94a3b8; display:block; margin-bottom:3px; }
.cost-bar .cval  { font-family:'JetBrains Mono',monospace; font-size:.95rem; font-weight:600; }
.cost-bar .cval.savings { color:#4ade80; }
.cost-bar .cval.total   { color:#fbbf24; }
.cost-bar .cval.weeks   { color:#93c5fd; }

/* Path table */
.paths-table {
  width:100%;
  border-collapse:collapse;
  font-size:.8rem;
}
.paths-table th {
  background:#f1f5f9;
  padding:6px 10px;
  text-align:left;
  font-size:.68rem;
  font-weight:700;
  text-transform:uppercase;
  letter-spacing:.06em;
  color:var(--muted);
  border-bottom:1px solid var(--border);
}
.paths-table td {
  padding:6px 10px;
  border-bottom:1px solid var(--border);
  color:#374151;
  font-family:'JetBrains Mono',monospace;
  font-size:.78rem;
  transition:background .2s;
}
.paths-table tr.crit td { background:var(--crit-light); }
.paths-table td.path-name { font-family:'DM Sans',system-ui,sans-serif; font-weight:600; color:var(--navy); font-size:.78rem; }
.crit-badge {
  display:inline-block; padding:1px 6px; border-radius:8px;
  background:#dc2626; color:#fff; font-size:.62rem; font-weight:700;
  font-family:'DM Sans',system-ui; margin-left:4px;
}

/* Activity crash table */
.act-table {
  width:100%;
  border-collapse:collapse;
  font-size:.78rem;
}
.act-table th {
  background:#f1f5f9;
  padding:5px 8px;
  text-align:center;
  font-size:.63rem;
  font-weight:700;
  text-transform:uppercase;
  letter-spacing:.04em;
  color:var(--muted);
  border-bottom:1px solid var(--border);
}
.act-table th:first-child { text-align:left; }
.act-table td {
  padding:5px 8px;
  border-bottom:1px solid var(--border);
  text-align:center;
  font-family:'JetBrains Mono',monospace;
  font-size:.76rem;
  color:#374151;
}
.act-table td:first-child { text-align:left; font-family:'DM Sans',system-ui; font-weight:600; color:var(--navy); }
.act-table tr.crashed td { background:#fff7ed; }
.act-table tr.best-option td { background:var(--green-light); }
.act-table tr.best-option td:first-child { color:var(--green); }
.act-crashed-badge {
  display:inline-block; padding:1px 5px; border-radius:6px;
  background:#f97316; color:#fff; font-size:.6rem; font-weight:700;
  font-family:'DM Sans',system-ui; margin-left:3px;
}
.act-best-badge {
  display:inline-block; padding:1px 5px; border-radius:6px;
  background:#059669; color:#fff; font-size:.6rem; font-weight:700;
  font-family:'DM Sans',system-ui; margin-left:3px;
}

.section-label {
  font-size:.68rem;
  font-weight:700;
  text-transform:uppercase;
  letter-spacing:.07em;
  color:var(--muted);
  margin-bottom:4px;
}

/* ── Right panel ── */
#panel {
  display:flex;
  flex-direction:column;
  background:#f8fafc;
}
#panel-body {
  flex:1;
  padding:18px 20px;
  overflow-y:auto;
}

/* Phase tag */
.tag {
  display:inline-block;
  padding:2px 9px;
  border-radius:10px;
  font-size:.68rem;
  font-weight:700;
  text-transform:uppercase;
  letter-spacing:.06em;
  margin-bottom:8px;
}
.tag-intro    { background:#e2e8f0; color:#475569; }
.tag-concept  { background:#dbeafe; color:#1d4ed8; }
.tag-cost     { background:#fef3c7; color:#92400e; }
.tag-crash    { background:#fee2e2; color:#b91c1c; }
.tag-optimal  { background:#d1fae5; color:#065f46; }

#step-title {
  font-size:1rem;
  font-weight:700;
  color:var(--navy);
  line-height:1.3;
  margin-bottom:10px;
}

.step-body p  { font-size:.84rem; line-height:1.65; color:#374151; margin-bottom:8px; }
.step-body ul, .step-body ol { padding-left:16px; margin-bottom:8px; }
.step-body li { font-size:.84rem; line-height:1.6; color:#374151; margin-bottom:3px; }
.step-body strong { color:var(--navy); }
.step-body em { color:var(--muted); }

.formula {
  background:#fff;
  border:1.5px solid #c7d2fe;
  border-radius:7px;
  padding:10px 14px;
  margin:10px 0;
  font-family:'JetBrains Mono',monospace;
  font-size:.82rem;
  color:#312e81;
}
.formula .flabel {
  font-family:'DM Sans',system-ui,sans-serif;
  font-size:.68rem;
  font-weight:700;
  color:#6366f1;
  text-transform:uppercase;
  letter-spacing:.05em;

}

.callout {

  padding:8px 12px;
  border-radius:0 6px 6px 0;
  margin:10px 0;
}
.callout p { margin-bottom:0; font-size:.82rem; }

.callout-green {
  border-left:3px solid #059669;
  background:var(--green-light);
}
.callout-red {
  border-left:3px solid #dc2626;
  background:var(--crit-light);
}
.callout-blue {
  border-left:3px solid #2563eb;
  background:#eff6ff;
}
.callout-purple {
  border-left:3px solid #7c3aed;
  background:var(--purple-light);
}

/* Cost curve visualization */
.cost-curve {
  background:#fff;
  border:1px solid var(--border);
  border-radius:8px;
  padding:12px;
  margin:10px 0;
}

/* Decision matrix */
.decision-row {
  display:flex;
  align-items:center;
  gap:8px;
  padding:6px 8px;
  border-radius:6px;
  margin-bottom:4px;
  font-size:.8rem;
}
.decision-row.good  { background:var(--green-light); }
.decision-row.bad   { background:var(--crit-light); }
.decision-row .icon { font-size:1rem; flex-shrink:0; }

/* Stage progress dots */
.stage-dots {
  display:flex;
  gap:6px;
  margin:8px 0;
}
.sdot {
  width:28px; height:28px; border-radius:50%;
  display:flex; align-items:center; justify-content:center;
  font-size:.7rem; font-weight:700;
  border:2px solid var(--border);
  color:var(--muted);
  background:#fff;
  transition:all .25s;
}
.sdot.done   { background:#059669; border-color:#059669; color:#fff; }
.sdot.active { background:var(--navy); border-color:var(--navy); color:#fff; }

/* Navigation */
#nav {
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:12px 20px;
  border-top:1px solid var(--border);
  background:#fff;
  flex-shrink:0;
}
.btn {
  padding:7px 16px;
  border-radius:7px;
  font-family:'DM Sans',system-ui;
  font-size:.82rem;
  font-weight:600;
  cursor:pointer;
  border:none;
  transition:all .2s;
}
.btn-ghost { background:#f1f5f9; color:var(--navy); }
.btn-ghost:hover:not(:disabled) { background:#e2e8f0; }
.btn-ghost:disabled { opacity:.35; cursor:not-allowed; }
.btn-primary { background:var(--navy); color:#fff; }
.btn-primary:hover:not(:disabled) { background:#162d4a; }
.btn-primary:disabled { opacity:.35; cursor:not-allowed; }
#sctr { font-size:.75rem; color:var(--muted); }

/* Summary table at end */
.summary-table {
  width:100%;
  border-collapse:collapse;
  font-size:.78rem;
}
.summary-table th {
  background:var(--navy);
  color:#fff;
  padding:6px 10px;
  font-size:.67rem;
  font-weight:700;
  text-transform:uppercase;
  letter-spacing:.05em;
}
.summary-table td {
  padding:6px 10px;
  border-bottom:1px solid var(--border);
  font-family:'JetBrains Mono',monospace;
  font-size:.75rem;
  text-align:right;
}
.summary-table td:first-child { text-align:center; font-family:'DM Sans'; font-weight:700; color:var(--navy); }
.summary-table tr:last-child { background:#f0fdf4; font-weight:700; }
</style>

<header>
  <h1>📉 CPM Cost–Time Optimization — St. John's Hospital</h1>
  <a href="cpm-walkthrough.html">← Critical Path Walkthrough</a>
</header>

<div class="prog-wrap">
  <div class="prog-track"><div class="prog-fill" id="pgfill" style="width:0%"></div></div>
  <div class="prog-lbl" id="pglbl">Step 1 of 20</div>
</div>

<div id="layout">

  <!-- ── LEFT: Dynamic cost / path / activity view ── -->
  <div id="left-panel">
    <div id="left-header">
      <h2 id="left-title">Project Overview</h2>
    </div>
    <div id="left-body">
      <!-- rendered by JS -->
    </div>
  </div>

  <!-- ── RIGHT: Explanatory panel ── -->
  <div id="panel">
    <div id="panel-body">
      <span class="tag tag-intro" id="phase-tag">Intro</span>
      <div id="step-title">Loading…</div>
      <div class="step-body" id="step-body"></div>
    </div>
    <div id="nav">
      <button class="btn btn-ghost" id="btn-prev" onclick="go(-1)" disabled>← Prev</button>
      <span id="sctr">1 / 20</span>
      <button class="btn btn-primary" id="btn-next" onclick="go(1)">Next →</button>
    </div>
  </div>

</div>

<script>
// ─────────────────────────────────────────────
//  DATA
// ─────────────────────────────────────────────

const INDIRECT = 8000;   // per week
const PENALTY_THRESH = 65;
const PENALTY = 20000;   // per week beyond 65

const ACTIVITIES = {
  A: { nt:12, nc:12000,  ct:11, cc:13000  },
  B: { nt:9,  nc:50000,  ct:7,  cc:64000  },
  C: { nt:10, nc:4000,   ct:5,  cc:7000   },
  D: { nt:10, nc:16000,  ct:8,  cc:20000  },
  E: { nt:24, nc:120000, ct:14, cc:200000 },
  F: { nt:10, nc:10000,  ct:6,  cc:16000  },
  G: { nt:35, nc:500000, ct:25, cc:530000 },
  H: { nt:40, nc:1200000,ct:35, cc:1260000},
  I: { nt:15, nc:40000,  ct:10, cc:52500  },
  J: { nt:4,  nc:10000,  ct:1,  cc:13000  },
  K: { nt:6,  nc:30000,  ct:5,  cc:34000  },
};

// crash cost per week
Object.keys(ACTIVITIES).forEach(k => {
  const a = ACTIVITIES[k];
  a.maxRed = a.nt - a.ct;
  a.ccpw = (a.cc - a.nc) / (a.nt - a.ct);
});

const PATHS_DEF = [
  { id:'AIK',   acts:['A','I','K'],     label:'A–I–K' },
  { id:'AFK',   acts:['A','F','K'],     label:'A–F–K' },
  { id:'ACGJK', acts:['A','C','G','J','K'], label:'A–C–G–J–K' },
  { id:'BDHIJK',acts:['B','D','H','J','K'], label:'B–D–H–J–K' },
  { id:'BEJK',  acts:['B','E','J','K'],  label:'B–E–J–K' },
];

// ─────────────────────────────────────────────
//  STATE per stage: crashed[act] = weeks crashed so far
// ─────────────────────────────────────────────

const STAGES = [
  { crashed:{}, highlight:[], bestOption:[], label:'Normal (no crashing)' },
  { crashed:{J:3}, highlight:['J'], bestOption:['J'], label:'Stage 1: Crash J by 3 wks' },
  { crashed:{J:3,D:2}, highlight:['D'], bestOption:['D'], label:'Stage 2: Crash D by 2 wks' },
  { crashed:{J:3,D:2,K:1}, highlight:['K'], bestOption:['K'], label:'Stage 3: Crash K by 1 wk' },
  { crashed:{J:3,D:2,K:1,B:2,C:2}, highlight:['B','C'], bestOption:['B','C'], label:'Stage 4: Crash B & C by 2 wks' },
];

function actDuration(act, crashed) {
  return ACTIVITIES[act].nt - (crashed[act] || 0);
}

function pathDuration(path, crashed) {
  return path.acts.reduce((s, a) => s + actDuration(a, crashed), 0);
}

function directCost(crashed) {
  let total = Object.values(ACTIVITIES).reduce((s,a) => s+a.nc, 0);
  Object.entries(crashed).forEach(([k,w]) => {
    total += w * ACTIVITIES[k].ccpw;
  });
  return total;
}

function totalCost(crashed) {
  const dur = maxPathDuration(crashed);
  const dc = directCost(crashed);
  const ic = dur * INDIRECT;
  const pen = Math.max(0, dur - PENALTY_THRESH) * PENALTY;
  return dc + ic + pen;
}

function maxPathDuration(crashed) {
  return Math.max(...PATHS_DEF.map(p => pathDuration(p, crashed)));
}

function criticalPaths(crashed) {
  const max = maxPathDuration(crashed);
  return PATHS_DEF.filter(p => pathDuration(p, crashed) === max).map(p => p.id);
}

// ─────────────────────────────────────────────
//  STEPS
// ─────────────────────────────────────────────

const STEPS = [

// ── CONCEPT INTRO ──────────────────────────────────────────────────────────

{
  phase:'concept', title:'Why Does Cost Matter in Project Scheduling?',
  leftMode:'intro',
  content:`
    <p>You've already mastered <strong>finding the critical path</strong> — the longest chain of activities that determines how fast a project finishes.</p>
    <p>But here's the next challenge: <em>finishing faster usually costs more money.</em> And sometimes, finishing slower costs more too — in penalties or lost revenue.</p>
    <p>The <strong>Cost–Time Trade-off Problem</strong> asks:</p>
    <div class="callout callout-blue"><p>💡 What is the <strong>minimum total cost</strong> schedule for this project?</p></div>
    <p>This isn't just "go as fast as possible" — it's about finding the <em>sweet spot</em> between speed and cost.</p>
  `
},

{
  phase:'concept', title:'Two Types of Project Costs',
  leftMode:'cost-types',
  content:`
    <p>Project costs fall into two buckets that <em>move in opposite directions</em> as you shorten project duration:</p>
    <p><strong>1. Direct Costs</strong> — the cost of doing the actual work (labor, materials, equipment). These <span style="color:var(--crit)">increase</span> when you crash activities (more overtime, more crews).</p>
    <p><strong>2. Indirect Costs</strong> — overhead costs that accrue over time (admin, facilities, supervision). These <span style="color:var(--green)">decrease</span> the faster you finish.</p>
    <div class="callout callout-blue"><p>⚖️ <strong>Total Cost = Direct + Indirect (+ Penalty, if any)</strong><br>The optimal schedule minimizes the sum of all three.</p></div>
  `
},

{
  phase:'concept', title:'Normal Time vs. Crash Time',
  leftMode:'act-table-intro',
  content:`
    <p>For each activity, we track four numbers:</p>
    <ul>
      <li><strong>Normal Time (NT)</strong> — how long under normal conditions</li>
      <li><strong>Normal Cost (NC)</strong> — what it costs normally</li>
      <li><strong>Crash Time (CT)</strong> — the <em>minimum</em> possible duration (max resources)</li>
      <li><strong>Crash Cost (CC)</strong> — what it costs at crash time</li>
    </ul>
    <div class="callout"><p>📐 We assume a <strong>linear relationship</strong> between time and cost. The cost of crashing by one week is constant for each activity.</p></div>
    <div class="formula">
      <span class="flabel">Cost to Crash per Week</span>
      (CC − NC) ÷ (NT − CT)
    </div>
    <p>For example, Activity H: (1,260,000 − 1,200,000) ÷ (40 − 35) = <strong>$12,000/week</strong>.</p>
  `
},

{
  phase:'concept', title:"St. John's Hospital: Starting Position",
  leftMode:'overview',
  stageIdx: 0,
  content:`
    <p>Here's the project at <strong>normal time</strong> — no crashing at all.</p>
    <p>The critical path is <strong>B–D–H–J–K</strong> at <strong>69 weeks</strong>.</p>
    <div class="formula">
      <span class="flabel">Normal Total Cost Calculation</span>
      Direct: $1,992,000<br>
      Indirect: 69 × $8,000 = $552,000<br>
      Penalty: (69−65) × $20,000 = $80,000<br>
      <strong>Total: $2,624,000</strong>
    </div>
    <div class="callout callout-red"><p>🚨 We're paying a <strong>$80,000 penalty</strong> because the project takes 4 weeks longer than 65. There's room to save.</p></div>
  `
},

// ── THE PROCEDURE ────────────────────────────────────────────────────────

{
  phase:'crash', title:'The 4-Step Crashing Procedure',
  leftMode:'procedure',
  content:`
    <p>We use a <strong>greedy algorithm</strong> — crash one week at a time, always choosing the cheapest option on the critical path.</p>
    <ol>
      <li>Identify the <strong>critical path(s)</strong>.</li>
      <li>Find the activity on the critical path with the <strong>lowest crash cost per week</strong>.</li>
      <li>Crash that activity <em>until</em> it can't be shortened further, <em>or</em> another path becomes critical, <em>or</em> saving stops exceeding cost.</li>
      <li>Repeat until <strong>total savings < crashing cost</strong>.</li>
    </ol>
    <div class="callout callout-blue"><p>💡 If multiple paths become critical simultaneously, you must crash <em>one activity on each critical path</em> — or a shared activity that's on all of them.</p></div>
  `
},

// ── STAGE 1 ──────────────────────────────────────────────────────────────

{
  phase:'crash', title:'Stage 1 — Identify the Cheapest Option',
  leftMode:'act-table',
  stageIdx: 0,
  highlightCrit: true,
  overrideBest: ['J'],
  content:`
    <p>Critical path: <strong>B–D–H–J–K</strong> (69 weeks)</p>
    <p>Look at the activities on this path and their crash costs per week:</p>
    <ul>
      <li>B: $7,000/wk &nbsp;|&nbsp; D: $2,000/wk</li>
      <li>H: $12,000/wk &nbsp;|&nbsp; J: <strong>$1,000/wk ← cheapest!</strong></li>
      <li>K: $4,000/wk</li>
    </ul>
    <p>Savings per week from crashing = <strong>$8,000</strong> (indirect) + <strong>$20,000</strong> (penalty) = <strong>$28,000/wk</strong>.</p>
    <div class="callout callout-green"><p>✅ J costs only $1,000/wk to crash. Every week we crash saves a net <strong>$27,000</strong>. Crash J as much as possible.</p></div>
  `
},

{
  phase:'crash', title:'Stage 1 — Crash Activity J',
  leftMode:'paths',
  stageIdx: 1,
  content:`
    <p>Activity J can be shortened by <strong>3 weeks</strong> (from 4 to 1 week — its crash limit).</p>
    <p>After crashing J by 3 weeks:</p>
    <ul>
      <li>B–D–H–J–K drops from 69 → <strong>66 weeks</strong></li>
      <li>A–C–G–J–K drops from 67 → <strong>64 weeks</strong></li>
    </ul>
    <div class="formula">
      <span class="flabel">Net Savings — Stage 1</span>
      3 × $28,000 (savings) − 3 × $1,000 (crash cost)<br>
      = $84,000 − $3,000 = <strong>$81,000</strong>
    </div>
    <div class="formula">
      <span class="flabel">New Total Cost</span>
      $2,624,000 − $81,000 = <strong>$2,543,000</strong>
    </div>
  `
},

// ── STAGE 2 ──────────────────────────────────────────────────────────────

{
  phase:'crash', title:'Stage 2 — Still One Critical Path',
  leftMode:'act-table',
  stageIdx: 1,
  highlightCrit: true,

        ${Object.entries(crashed).length === 0 ? '<span style="color:var(--muted);font-size:.8rem">None yet</span>' :
          Object.entries(crashed).map(([k,w]) => `
            <span style="background:#fff7ed;border:1.5px solid #fdba74;border-radius:6px;padding:3px 8px;font-size:.78rem;font-weight:600;color:#92400e">
              ${k}: −${w} wk${w>1?'s':''}
            </span>
          `).join('')
        }
      </div>
    `;
    return;
  }

  // ── Stop check ──
  if (s.leftMode === 'stop-check') {
    lt.textContent = 'Stage 4 — Final State';
    lb.innerHTML = `
      <div class="cost-bar" style="margin-bottom:4px">
        <div class="citem"><span class="clbl">Duration</span><span class="cval weeks">${duration} wks</span></div>
        <div class="citem"><span class="clbl">Total Cost</span><span class="cval total">${fmt(tc)}</span></div>
        <div class="citem"><span class="clbl">Total Saved</span><span class="cval savings">${fmt(savings)}</span></div>
      </div>
      <div class="section-label">Remaining Crash Options</div>
      ${[
        ['(A, H)', '1,000+12,000', 13000, 8000, false],
        ['(C, H)', '600+12,000', 12600, 8000, false],
        ['(G, H)', '3,000+12,000', 15000, 8000, false],
      ].map(([pair, calc, cost, save, ok]) => `
        <div style="border:1px solid var(--border);border-radius:7px;padding:9px 12px;margin-bottom:6px;background:${ok?'var(--green-light)':'var(--crit-light)'}">
          <div style="font-weight:700;font-size:.82rem;color:${ok?'var(--green)':'#b91c1c'};margin-bottom:3px">${ok?'✅':'❌'} Crash ${pair}</div>
          <div style="font-size:.78rem;color:#374151;font-family:'JetBrains Mono',monospace">
            Cost: $${calc} = $${cost.toLocaleString()}/wk<br>
            Save: $${save.toLocaleString()}/wk<br>
            Net: <strong>${ok?'+':''}$${(save-cost).toLocaleString()}/wk</strong>
          </div>
        </div>
      `).join('')}
      <div class="callout callout-red"><p>All remaining options cost more than they save. <strong>Optimal solution reached.</strong></p></div>
    `;
    return;
  }

  // ── Summary ──
  if (s.leftMode === 'summary') {
    lt.textContent = 'Crashing Summary — All Stages';
    const rows = [
      { stage:'0 (Normal)', acts:'—', wks:0, sav:0, tot:2624000 },
      { stage:'1', acts:'J', wks:3, sav:81000, tot:2543000 },
      { stage:'2', acts:'D', wks:2, sav:32000, tot:2511000 },
      { stage:'3', acts:'K', wks:1, sav:4000,  tot:2507000 },
      { stage:'4', acts:'B, C', wks:2, sav:800, tot:2506200 },
    ];
    lb.innerHTML = `
      <table class="summary-table">
        <thead>
          <tr>
            <th>Stage</th>
            <th>Crashed</th>
            <th>Wks</th>
            <th>Savings</th>
            <th>Total Cost</th>
          </tr>
        </thead>
        <tbody>
          ${rows.map((r,i) => `
            <tr style="${i===rows.length-1?'background:#f0fdf4':''}">
              <td>${r.stage}</td>
              <td style="font-family:'DM Sans';text-align:left">${r.acts}</td>
              <td>${r.wks}</td>
              <td style="color:${r.sav>0?'var(--green)':'var(--muted)'}">${r.sav>0?'+$'+r.sav.toLocaleString():'—'}</td>
              <td>${fmt(r.tot)}</td>
            </tr>
          `).join('')}
        </tbody>
      </table>
      <div style="margin-top:10px;background:var(--navy);border-radius:8px;padding:12px;color:#fff">
        <div style="font-size:.7rem;color:#94a3b8;margin-bottom:6px;font-weight:700;text-transform:uppercase;letter-spacing:.06em">Optimal Schedule</div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px">
          <div><span style="font-size:.72rem;color:#94a3b8;display:block">Duration</span><span style="font-family:'JetBrains Mono';color:#93c5fd;font-size:1rem;font-weight:600">61 weeks</span></div>
          <div><span style="font-size:.72rem;color:#94a3b8;display:block">Total Cost</span><span style="font-family:'JetBrains Mono';color:#fbbf24;font-size:1rem;font-weight:600">$2,506,200</span></div>
          <div><span style="font-size:.72rem;color:#94a3b8;display:block">Saved vs Normal</span><span style="font-family:'JetBrains Mono';color:#4ade80;font-size:1rem;font-weight:600">$117,800</span></div>
          <div><span style="font-size:.72rem;color:#94a3b8;display:block">Weeks Shortened</span><span style="font-family:'JetBrains Mono';color:#4ade80;font-size:1rem;font-weight:600">8 weeks</span></div>
        </div>
      </div>
    `;
    return;
  }

  // ── Takeaways ──
  if (s.leftMode === 'takeaways') {
    lt.textContent = 'Crashing Decision Logic';
    lb.innerHTML = `
      <div class="section-label">When Is It Worth Crashing?</div>
      <div class="decision-row good"><span class="icon">✅</span><span>Crash cost/wk &lt; savings/wk (indirect + penalty)</span></div>
      <div class="decision-row bad"><span class="icon">❌</span><span>Crash cost/wk &gt; savings/wk → Stop. You've passed the optimum.</span></div>
      <div style="margin-top:10px" class="section-label">How Savings Change Over Time</div>
      ${[
        ['While > 65 weeks', '$8,000 + $20,000 = $28,000/wk', 'var(--amber-light)', '#92400e'],
        ['Once ≤ 65 weeks', '$8,000/wk (indirect only)', '#eff6ff', '#1d4ed8'],
        ['No penalty, one path', 'Crash cheapest on critical path', 'var(--green-light)', '#065f46'],
        ['Two critical paths', 'Must crash both — find cheapest combo', 'var(--purple-light)', '#6d28d9'],
      ].map(([when,rule,bg,c]) => `
        <div style="background:${bg};border-radius:7px;padding:8px 10px;margin-bottom:6px">
          <div style="font-size:.72rem;font-weight:700;color:${c};text-transform:uppercase;letter-spacing:.04em;margin-bottom:2px">${when}</div>
          <div style="font-size:.8rem;color:#374151">${rule}</div>
        </div>
      `).join('')}
    `;
    return;
  }
}

// ─────────────────────────────────────────────
//  Panel rendering
// ─────────────────────────────────────────────

const phaseLabel = { concept:'Concept', crash:'Crashing', optimal:'Optimal Solution', intro:'Introduction' };
const phaseClass = { concept:'tag-concept', crash:'tag-crash', optimal:'tag-optimal', intro:'tag-intro' };

function renderPanel() {
  const s = STEPS[step];
  const tag = document.getElementById('phase-tag');
  tag.textContent = phaseLabel[s.phase] || s.phase;
  tag.className = 'tag ' + (phaseClass[s.phase] || 'tag-intro');
  document.getElementById('step-title').textContent = s.title;
  document.getElementById('step-body').innerHTML = s.content;
}

function renderProgress() {
  const pct = step / (STEPS.length - 1) * 100;
  document.getElementById('pgfill').style.width = pct + '%';
  document.getElementById('pglbl').textContent = `Step ${step+1} of ${STEPS.length}`;
  document.getElementById('sctr').textContent = `${step+1} / ${STEPS.length}`;
  document.getElementById('btn-prev').disabled = step === 0;
  document.getElementById('btn-next').disabled = step === STEPS.length - 1;
  document.getElementById('btn-next').textContent = step === STEPS.length-1 ? '✓ Done' : 'Next →';
}

function render() {
  renderPanel();
  renderLeft(STEPS[step]);
  renderProgress();
}

function go(dir) {
  step = Math.max(0, Math.min(STEPS.length - 1, step + dir));
  render();
}

document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight' || e.key === ' ') { e.preventDefault(); go(1); }
  if (e.key === 'ArrowLeft') { e.preventDefault(); go(-1); }
});

render();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<title>Critical Path Analysis — St. John's Hospital</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap');

:root {
  --bg: #f0f4f8;
  --card: #ffffff;
  --border: #e2e8f0;
  --text: #1a202c;
  --muted: #64748b;
  --navy: #1e3a5f;
  --blue: #2563eb;
  --gold: #d97706;
  --crit: #dc2626;
  --crit-light: #fef2f2;
  --green: #059669;
  --shadow: 0 2px 8px rgba(0,0,0,0.08);
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family:'DM Sans',system-ui,sans-serif;
  background:var(--bg);
  color:var(--text);
  height:100vh;
  display:flex;
  flex-direction:column;
  overflow:hidden;
}

/* ── Header ── */
header {
  background:var(--navy);
  color:#fff;
  padding:10px 20px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  flex-shrink:0;
}
header h1 { font-size:.95rem; font-weight:600; letter-spacing:-.01em; }
header a  { color:#93c5fd; font-size:.8rem; text-decoration:none; }
header a:hover { color:#fff; }

/* ── Progress bar ── */
.prog-wrap {
  background:var(--navy);
  padding:0 20px 8px;
  display:flex;
  align-items:center;
  gap:10px;
  flex-shrink:0;
}
.prog-track { flex:1; height:5px; background:#2d4e73; border-radius:3px; }
.prog-fill   { height:100%; background:#f59e0b; border-radius:3px; transition:width .35s ease; }
.prog-lbl    { color:#94a3b8; font-size:.72rem; min-width:70px; text-align:right; }

/* ── Main layout ── */
#layout {
  flex:1;
  display:grid;
  grid-template-columns:1fr 340px;
  overflow:hidden;
}

/* ── Diagram panel ── */
#diag-wrap {
  background:#fff;
  border-right:1px solid var(--border);
  display:flex;
  align-items:center;
  justify-content:center;
  padding:12px;
  overflow:hidden;
}
#cpm-svg { width:100%; height:100%; }

/* ── Info panel ── */
#panel {
  display:flex;
  flex-direction:column;
  background:#f8fafc;
}
#panel-body {
  flex:1;
  padding:18px 20px;
  overflow-y:auto;
}

/* Phase tag */
.tag {
  display:inline-block;
  padding:2px 9px;
  border-radius:10px;
  font-size:.68rem;
  font-weight:700;
  text-transform:uppercase;
  letter-spacing:.06em;
  margin-bottom:8px;
}
.tag-intro    { background:#e2e8f0; color:#475569; }
.tag-forward  { background:#dbeafe; color:#1d4ed8; }
.tag-backward { background:#ede9fe; color:#6d28d9; }
.tag-critical { background:#fee2e2; color:#b91c1c; }

#step-title {
  font-size:1rem;
  font-weight:700;
  color:var(--navy);
  line-height:1.3;
  margin-bottom:10px;
}

.step-body p  { font-size:.84rem; line-height:1.65; color:#374151; margin-bottom:8px; }
.step-body ul, .step-body ol { padding-left:16px; margin-bottom:8px; }
.step-body li { font-size:.84rem; line-height:1.6; color:#374151; margin-bottom:3px; }
.step-body strong { color:var(--navy); }

.formula {
  background:#fff;
  border:1.5px solid #c7d2fe;
  border-radius:7px;
  padding:10px 14px;
  margin:10px 0;
  font-family:'JetBrains Mono',monospace;
  font-size:.82rem;
  color:#312e81;
}
.formula .flabel {
  font-family:'DM Sans',system-ui,sans-serif;
  font-size:.68rem;
  font-weight:700;
  color:#6366f1;
  text-transform:uppercase;
  letter-spacing:.05em;
  display:block;
  margin-bottom:4px;
}

.callout {
  border-left:3px solid #f59e0b;
  background:#fffbeb;
  padding:8px 12px;
  border-radius:0 6px 6px 0;
  margin:10px 0;
  font-size:.82rem;
  color:#78350f;
  line-height:1.55;
}
.callout.red   { border-color:var(--crit); background:var(--crit-light); color:#991b1b; }
.callout.blue  { border-color:#3b82f6; background:#eff6ff; color:#1e40af; }
.callout.green { border-color:#10b981; background:#ecfdf5; color:#065f46; }

.ctable { width:100%; border-collapse:collapse; font-size:.79rem; margin:8px 0; }
.ctable th { background:#e0e7ff; color:#3730a3; padding:5px 7px; text-align:left; font-weight:600; }
.ctable td { padding:4px 7px; border-bottom:1px solid var(--border); }
.ctable tr.crit td { background:var(--crit-light); color:#991b1b; font-weight:600; }
.ctable tr.focus td { background:#fef9c3; }

/* ── Navigation ── */
#panel-nav {
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:10px 16px;
  background:#fff;
  border-top:1px solid var(--border);
  flex-shrink:0;
}
#panel-nav button {
  padding:7px 16px;
  border-radius:6px;
  font-size:.82rem;
  font-weight:600;
  cursor:pointer;
  border:none;
  transition:background .15s;
}
#btn-prev { background:#e2e8f0; color:#475569; }
#btn-prev:hover:not(:disabled) { background:#cbd5e1; }
#btn-prev:disabled { opacity:.35; cursor:default; }
#btn-next { background:var(--navy); color:#fff; }
#btn-next:hover { background:#2c5282; }
.sctr { font-size:.75rem; color:#94a3b8; }

/* ── Node label (guide box) ── */
#node-guide {
  position:absolute;
  pointer-events:none;
  display:none;
}
</style>
</head>

  content:`<p>CPM is a project scheduling technique that identifies the <strong>critical path</strong> — the longest sequence of dependent activities that determines the minimum project duration.</p>

  <p>Activities off the critical path have slack — room to slip without affecting the end date.</p>

{

},
{
  title:'Step 4 — Activity G (from C)',
  phase:'forward',
  content:`<p>G can begin once C finishes at week 22.</p>
  <table class="ctable">

},
{

  content:`<p>H begins once D finishes at week 19.</p>

{

  content:`<p>J can only start after <em>all three</em> predecessors finish: H, E, and G.</p>

// ─────────────────────────────────────────────
//  State
// ─────────────────────────────────────────────
let step = 0;

// Compute cumulative revealed values up to stepIdx
function getRevealed(stepIdx) {
  const rev = {};
  for (let i=0; i<=stepIdx; i++) {
    const nr = STEPS[i].newReveal || {};
    for (const [id, vals] of Object.entries(nr)) {
      if (!rev[id]) rev[id]=new Set();
      vals.forEach(v=>rev[id].add(v));
    }
  }
  return rev;
}

// ─────────────────────────────────────────────
//  SVG rendering helpers
// ─────────────────────────────────────────────
function nodePos(id) {
  if (id==='START') return {x:42,y:266};
  if (id==='FINISH') return {x:908,y:213};
  return {x:ACT[id].x, y:ACT[id].y};
}

function edgeEndpoints(from, to) {
  const p1=nodePos(from), p2=nodePos(to);
  const dx=p2.x-p1.x, dy=p2.y-p1.y;
  const len=Math.sqrt(dx*dx+dy*dy);
  const ux=dx/len, uy=dy/len;
  // Offset from center to edge of box
  const r1 = from==='START'||from==='FINISH' ? {w:32,h:16} : {w:NW/2,h:NH/2};
  const r2 = to==='START'||to==='FINISH'     ? {w:32,h:16} : {w:NW/2,h:NH/2};
  const t1 = Math.min(r1.w/Math.abs(ux||.001), r1.h/Math.abs(uy||.001));
  const t2 = Math.min(r2.w/Math.abs(ux||.001), r2.h/Math.abs(uy||.001));
  return {
    x1: p1.x+ux*t1+1, y1: p1.y+uy*t1+1,
    x2: p2.x-ux*t2-2, y2: p2.y-uy*t2-2,
  };
}

function renderEdges(focusNodes, showCrit) {
  const critNodes = new Set(['B','D','H','J','K']);
  return EDGES.map(([from,to,isCrit])=>{
    const ep=edgeEndpoints(from,to);
    const edgeId=`e-${from}-${to}`;
    const onCritPath = isCrit;
    const involvesFocus = focusNodes.length===0 ||
      focusNodes.includes(from) || focusNodes.includes(to);
    const dimEdge = focusNodes.length>0 && !involvesFocus;
    const color = dimEdge ? '#cbd5e1' :
                  (onCritPath && showCrit) ? '#dc2626' :
                  onCritPath ? '#e84c1e' : '#4a90d9';
    const marker = dimEdge ? 'ah-dim' :
                   (onCritPath && showCrit) ? 'ah-crit' :
                   onCritPath ? 'ah-crit' : 'ah-blue';
    const opacity = dimEdge ? 0.25 : 1;
    const sw = (onCritPath && !dimEdge) ? 2.2 : 1.6;
    return `<line id="${edgeId}" x1="${ep.x1}" y1="${ep.y1}" x2="${ep.x2}" y2="${ep.y2}"
      stroke="${color}" stroke-width="${sw}" marker-end="url(#${marker})"
      opacity="${opacity}" stroke-linecap="round"/>`;
  }).join('');
}

function renderNode(id, data, opts) {
  const {show=new Set(), highlight=false, dim=false, showCrit=false} = opts;
  const {x,y,es,ef,ls,lf,d,s,crit} = data;
  const x0=x-NW/2, y0=y-NH/2;
  const midY=y;
  const glowing = highlight;

  const centerFill = crit ? '#991b1b' : '#1e3a5f';
  const leftFill   = highlight ? '#fde68a' : '#d4c4a8';
  const rightFill  = highlight ? '#fbbf24' : '#f4b942';
  const stroke     = highlight ? '#d97706' : crit ? '#b91c1c' : '#94a3b8';
  const sw         = highlight ? 2.5 : crit ? 2 : 1.5;
  const op         = dim ? 0.18 : 1;
  const filter     = highlight ? 'filter="url(#glow)"' : '';

  const tv = (v, txt, x, y) =>
    show.has(v) ? `<text x="${x}" y="${y}" text-anchor="middle" dominant-baseline="middle"
      font-size="10.5" font-weight="700" fill="#1a202c" font-family="DM Sans,system-ui">${txt}</text>` : '';

  const slackColor = s===0 ? '#dc2626' : '#6b7280';
  const slackW     = s===0 ? '700' : '400';

  return `<g id="node-${id}" opacity="${op}" ${filter}>
    <rect x="${x0}" y="${y0}" width="${NW}" height="${NH}" rx="4" fill="white" stroke="${stroke}" stroke-width="${sw}"/>
    <!-- Left col -->
    <path d="M${x0+3},${y0} H${x0+LC} V${y0+NH} H${x0+3} A3,3 0 0,1 ${x0},${y0+NH-3} V${y0+3} A3,3 0 0,1 ${x0+3},${y0}Z" fill="${leftFill}"/>
    <!-- Center col -->
    <rect x="${x0+LC}" y="${y0}" width="${CC}" height="${NH}" fill="${centerFill}"/>
    <!-- Right col -->
    <path d="M${x0+LC+CC},${y0} H${x0+NW-3} A3,3 0 0,1 ${x0+NW},${y0+3} V${y0+NH-3} A3,3 0 0,1 ${x0+NW-3},${y0+NH} H${x0+LC+CC}Z" fill="${rightFill}"/>
    <!-- Dividers -->
    <line x1="${x0}" y1="${midY}" x2="${x0+NW}" y2="${midY}" stroke="${stroke}" stroke-width=".8"/>
    <line x1="${x0+LC}" y1="${y0}" x2="${x0+LC}" y2="${y0+NH}" stroke="${stroke}" stroke-width=".8"/>
    <line x1="${x0+LC+CC}" y1="${y0}" x2="${x0+LC+CC}" y2="${y0+NH}" stroke="${stroke}" stroke-width=".8"/>
    <!-- Activity letter -->
    <text x="${x}" y="${midY-8}" text-anchor="middle" dominant-baseline="middle"
      font-size="16" font-weight="800" fill="white" font-family="DM Sans,system-ui">${id}</text>
    <!-- Duration -->
    <text x="${x}" y="${midY+14}" text-anchor="middle" dominant-baseline="middle"
      font-size="9.5" fill="rgba(255,255,255,.85)" font-family="DM Sans,system-ui">${d} wks</text>
    <!-- ES EF LS LF -->
    ${tv('es', es, x0+11, midY-8)}
    ${tv('ef', ef, x0+LC+CC+11, midY-8)}
    ${tv('ls', ls, x0+11, midY+14)}
    ${tv('lf', lf, x0+LC+CC+11, midY+14)}
    <!-- Slack -->
    ${show.has('s') ? `<text x="${x}" y="${y0+NH+15}" text-anchor="middle" font-size="10"
      fill="${slackColor}" font-weight="${slackW}" font-family="DM Sans,system-ui">S = ${s}</text>` : ''}
  </g>`;
}

function renderDiagram() {
  const s = STEPS[step];
  const revealed = getRevealed(step);
  const focusSet = new Set(s.focus || []);
  const dimOthers = s.dimOthers && focusSet.size > 0;

  // Edges
  document.getElementById('svg-edges').innerHTML =
    renderEdges(s.focus||[], s.showCrit||false);

  // Start / Finish boxes
  const startDim = dimOthers && !focusSet.has('START');
  const finDim   = dimOthers && !focusSet.has('FINISH');
  const extraNodes = `
    <g id="node-START" opacity="${startDim?0.18:1}">
      <rect x="10" y="250" width="65" height="32" rx="6" fill="#d97706" stroke="#92400e" stroke-width="1.5"/>
      <text x="42" y="266" text-anchor="middle" dominant-baseline="middle"
        font-size="13" font-weight="700" fill="white" font-family="DM Sans,system-ui">Start</text>
    </g>
    <g id="node-FINISH" opacity="${finDim?0.18:1}">
      <rect x="858" y="197" width="68" height="32" rx="6" fill="#d97706" stroke="#92400e" stroke-width="1.5"/>
      <text x="892" y="213" text-anchor="middle" dominant-baseline="middle"
        font-size="13" font-weight="700" fill="white" font-family="DM Sans,system-ui">Finish</text>
    </g>`;

  // Activity nodes
  let nodesSVG = extraNodes;
  for (const [id, data] of Object.entries(ACT)) {
    const highlight = focusSet.has(id);
    const dim = dimOthers && !highlight;
    nodesSVG += renderNode(id, data, {
      show: revealed[id] || new Set(),
      highlight, dim,
      showCrit: s.showCrit||false,
    });
  }
  document.getElementById('svg-nodes').innerHTML = nodesSVG;
}

// ─────────────────────────────────────────────
//  Panel rendering
// ─────────────────────────────────────────────
const phaseLabel = {intro:'Intro',forward:'Forward Pass',backward:'Backward Pass',critical:'Critical Path'};
const phaseClass = {intro:'tag-intro',forward:'tag-forward',backward:'tag-backward',critical:'tag-critical'};

function renderPanel() {
  const s = STEPS[step];
  const tag = document.getElementById('phase-tag');
  tag.textContent = phaseLabel[s.phase];
  tag.className = 'tag ' + phaseClass[s.phase];
  document.getElementById('step-title').textContent = s.title;
  document.getElementById('step-body').innerHTML = s.content;
}

function renderProgress() {
  const pct = step / (STEPS.length-1) * 100;
  document.getElementById('pgfill').style.width = pct + '%';
  document.getElementById('pglbl').textContent = `Step ${step+1} of ${STEPS.length}`;
  document.getElementById('sctr').textContent = `${step+1} / ${STEPS.length}`;
  document.getElementById('btn-prev').disabled = step===0;
  document.getElementById('btn-next').disabled = step===STEPS.length-1;
  document.getElementById('btn-next').textContent =
    step===STEPS.length-1 ? '✓ Done' : 'Next →';
}

function render() {
  renderPanel();
  renderDiagram();
  renderProgress();
}

function go(dir) {
  step = Math.max(0, Math.min(STEPS.length-1, step+dir));
  render();
}

// Keyboard nav
document.addEventListener('keydown', e=>{
  if (e.key==='ArrowRight'||e.key===' ') { e.preventDefault(); go(1); }
  if (e.key==='ArrowLeft')               { e.preventDefault(); go(-1); }
});

render();
</script>
